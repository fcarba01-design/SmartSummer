<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verano con Sebastián 🚀 — Plan de 90 Minutos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0E14;
    --surface: #12161F;
    --surface-2: #1A1F2E;
    --border: rgba(0, 229, 255, 0.12);
    --border-dim: rgba(255,255,255,0.06);
    --cyan: #00E5FF;
    --cyan-dim: rgba(0, 229, 255, 0.18);
    --violet: #7C5CFF;
    --violet-dim: rgba(124, 92, 255, 0.15);
    --amber: #FFB020;
    --amber-dim: rgba(255, 176, 32, 0.15);
    --green: #27ae60;
    --green-dim: rgba(39, 174, 96, 0.15);
    --text: #E8ECF4;
    --text-muted: rgba(232, 236, 244, 0.45);
    --text-dim: rgba(232, 236, 244, 0.22);
    --mono: 'JetBrains Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
  }

  body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }

  body::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.08), transparent);
    animation: scanline 8s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 40px 24px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,229,255,0.04) 0%, transparent 100%);
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 24px 32px;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
  }

  .header-text {
    grid-column: 1;
    grid-row: 1;
  }

  .header-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(24px, 4vw, 38px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 span { color: var(--cyan); }

  .header-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 10px;
    letter-spacing: 0.05em;
  }

  .ring-wrap {
    grid-column: 2;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .ring-container {
    position: relative;
    width: 140px;
    height: 140px;
  }

  .ring-svg {
    width: 140px;
    height: 140px;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: rgba(0,229,255,0.1);
    stroke-width: 8;
  }

  .ring-progress {
    fill: none;
    stroke: var(--cyan);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 376;
    stroke-dashoffset: 376;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
    filter: drop-shadow(0 0 6px rgba(0,229,255,0.6));
  }

  .ring-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    color: var(--amber);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .ring-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .stat-bar {
    grid-column: 1;
    grid-row: 2;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
  }

  .stat-value.amber { color: var(--amber); }
  .stat-value.cyan { color: var(--cyan); }
  .stat-value.violet { color: var(--violet); }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .stat-divider {
    width: 1px;
    background: var(--border-dim);
    align-self: stretch;
  }

  main {
    position: relative;
    z-index: 1;
    padding: 32px 24px;
    max-width: 1100px;
    margin: 0 auto;
  }

  #dia-cabecera-titulo {
    font-size: 22px;
    color: var(--cyan);
    margin-bottom: 24px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .grid-bloques {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .module {
    background: var(--surface);
    border: 1px solid var(--border-dim);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: border-color 0.3s, background 0.3s;
    position: relative;
    overflow: hidden;
  }

  .module::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .module:hover {
    border-color: var(--border);
    background: var(--surface-2);
  }

  .module:hover::before { opacity: 0.5; }

  .module.completado {
    border-color: rgba(39, 174, 96, 0.3);
    background: rgba(39, 174, 96, 0.04);
  }

  .module.completado::before {
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 1;
  }

  .module-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .module-icon-wrap {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: var(--violet-dim);
    border: 1px solid rgba(124,92,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .module.completado .module-icon-wrap {
    background: var(--green-dim);
    border-color: rgba(39, 174, 96, 0.3);
  }

  .module-title-group { flex: 1; }

  .module-id {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .module-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .module-status {
    font-family: var(--mono);
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .status-pending {
    background: var(--violet-dim);
    color: var(--violet);
    border: 1px solid rgba(124,92,255,0.25);
  }

  .status-done {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(39, 174, 96, 0.3);
  }

  .module-progress-bar {
    height: 2px;
    background: var(--border-dim);
    border-radius: 1px;
    overflow: hidden;
    margin: -4px 0;
  }

  .module-progress-fill {
    height: 100%;
    background: var(--cyan);
    border-radius: 1px;
    width: 0%;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
  }

  .module.completado .module-progress-fill {
    background: var(--green);
    box-shadow: 0 0 6px rgba(39, 174, 96, 0.8);
  }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--cyan);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-dim);
  }

  .section-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.55;
  }

  .btn-responder {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid rgba(124,92,255,0.35);
    background: var(--violet-dim);
    color: var(--violet);
    font-family: var(--display);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: auto;
  }

  .btn-responder:hover:not(:disabled) {
    background: rgba(124,92,255,0.25);
    border-color: rgba(124,92,255,0.6);
    transform: translateY(-1px);
  }

  .btn-responder:disabled {
    border-color: rgba(39, 174, 96, 0.25);
    background: var(--green-dim);
    color: var(--green);
    cursor: default;
  }

  .panel-padres {
    background: rgba(124, 92, 255, 0.03);
    border: 1px solid rgba(124, 92, 255, 0.2);
    border-radius: 12px;
    padding: 24px;
    margin-top: 32px;
  }

  .panel-padres h2 {
    font-size: 16px;
    color: var(--violet);
    margin-bottom: 8px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    font-family: var(--mono);
  }

  .panel-padres p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .btn-firma {
    background: var(--violet-dim);
    color: var(--violet);
    border: 1px solid rgba(124, 92, 255, 0.4);
    padding: 12px 24px;
    border-radius: 8px;
    font-family: var(--display);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-firma:hover:not(:disabled) {
    background: rgba(124, 92, 255, 0.2);
    border-color: rgba(124, 92, 255, 0.7);
  }

  .btn-firma:disabled {
    background: var(--border-dim);
    color: var(--text-dim);
    border-color: transparent;
    cursor: not-allowed;
  }

  .error-card {
    background: rgba(255,80,80,0.06);
    border: 1px solid rgba(255,80,80,0.2);
    border-radius: 12px;
    padding: 28px;
  }

  #cargando {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
  }

  @media (max-width: 640px) {
    header { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
    .ring-wrap { grid-column: 1; grid-row: 2; flex-direction: row; justify-content: flex-start; }
    .stat-bar { grid-row: 3; }
  }
</style>
</head>
<body>

<header>
  <div class="header-text">
    <p class="header-eyebrow">Cronograma de 90 Minutos — Verano 2026</p>
    <h1>Panel de <span>Sebastián</span></h1>
    <p class="header-sub">Preparando 6.º de Primaria · Bloqueo Diario Activo</p>
  </div>

  <div class="ring-wrap">
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 140 140" aria-hidden="true">
        <circle class="ring-track" cx="70" cy="70" r="60"/>
        <circle class="ring-progress" id="ringProgress" cx="70" cy="70" r="60"/>
      </svg>
      <div class="ring-inner">
        <span class="ring-value" id="puntosDisplay">0</span>
        <span class="ring-label">puntos</span>
      </div>
    </div>
  </div>

  <div class="stat-bar">
    <div class="stat">
      <span class="stat-value amber" id="statPuntos">0</span>
      <span class="stat-label">Puntos totales</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value cyan" id="statCompletados">0/10</span>
      <span class="stat-label">Días Listos</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value violet" id="statPorcentaje">0%</span>
      <span class="stat-label">Progreso Global</span>
    </div>
  </div>
</header>

<main id="app">
  <p id="cargando">Cargando cronograma diario...</p>
</main>

<script>
let diaActual = Number(localStorage.getItem("seb_dia_actual")) || 1;
// Local state for current day sub-fases
let resueltasDia = JSON.parse(localStorage.getItem(`seb_fases_dia_${diaActual}`) || '{"lectura":false,"estudio":false,"practica":false,"proyecto":false}');

function actualizarGlobalUI(totalDias) {
  const completados = diaActual - 1;
  const puntosTotales = completados * 100; // 100 puntos por día completo aprobado
  const pct = Math.round((completados / totalDias) * 100);

  document.getElementById("puntosDisplay").textContent = puntosTotales;
  document.getElementById("statPuntos").textContent = puntosTotales;
  document.getElementById("statCompletados").textContent = completados + "/" + totalDias;
  document.getElementById("statPorcentaje").textContent = pct + "%";

  const circunferencia = 376;
  const offset = circunferencia - (circunferencia * Math.min(completados / totalDias, 1));
  document.getElementById("ringProgress").style.strokeDashoffset = offset;
}

function normalizar(texto) {
  return texto.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").trim().replace(/\s+/g, " ");
}

function escapeHTML(texto) {
  const div = document.createElement("div");
  div.textContent = texto;
  return div.innerHTML;
}

if (window.location.protocol === "file:") {
  document.getElementById("app").innerHTML = `
    <div class="error-card">
      <h2>⚠ Servidor Local Requerido</h2>
      <p>El navegador bloquea las solicitudes locales. Levanta un servidor con: <code>python3 -m http.server</code> en esta carpeta.</p>
    </div>
  `;
} else {
  fetch("tareas.json")
    .then(res => {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    })
    .then(data => {
      const app = document.getElementById("app");
      app.innerHTML = "";

      const diaData = data.dias.find(d => d.numero === diaActual);

      if (!diaData) {
        app.innerHTML = `<div class='module' style='text-align:center; padding:40px;'><h2 style='color:var(--cyan); margin-bottom:10px;'>¡Completado! 🎉</h2><p class='section-text'>Sebastián ha finalizado con éxito los 10 días del plan de preparación para 6.º de Primaria.</p></div>`;
        actualizarGlobalUI(data.dias.length);
        return;
      }

      actualizarGlobalUI(data.dias.length);

      // Create title
      const h2 = document.createElement("h2");
      h2.id = "dia-cabecera-titulo";
      h2.textContent = diaData.titulo;
      app.appendChild(h2);

      // Grid container for subfases
      const grid = document.createElement("div");
      grid.className = "grid-bloques";
      app.appendChild(grid);

      // 4 Fases layout mapping
      const fasesClaves = ["lectura", "estudio", "practica", "proyecto"];
      const iconos = { lectura: "📖", estudio: "🧠", practica: "✏️", proyecto: "🚀" };
      const etiquetas = { lectura: "15 MIN — LECTURA", estudio: "30 MIN — ESTUDIO", practica: "30 MIN — PRÁCTICA", proyecto: "15 MIN — MINI PROYECTO" };

      fasesClaves.forEach((faseKey) => {
        const fase = diaData.fases[faseKey];
        const completada = resueltasDia[faseKey];
        const card = document.createElement("article");
        card.className = "module" + (completada ? " completado" : "");
        card.id = `card-${faseKey}`;

        let interactiveElement = "";
        if (faseKey === "lectura" || faseKey === "proyecto") {
          interactiveElement = `<button class="btn-responder" id="btn-${faseKey}" ${completada ? "disabled" : ""}>${completada ? "✓ Confirmado" : "Marcar como hecho"}</button>`;
        } else {
          interactiveElement = `<button class="btn-responder" id="btn-${faseKey}" ${completada ? "disabled" : ""}>${completada ? "✓ Resuelto" : "Validar Respuesta"}</button>`;
        }

        card.innerHTML = `
          <div class="module-head">
            <div class="module-icon-wrap">${iconos[faseKey]}</div>
            <div class="module-title-group">
              <p class="module-id">${etiquetas[faseKey]}</p>
              <p class="module-name">${escapeHTML(fase.titulo)}</p>
            </div>
            <span class="module-status ${completada ? "status-done" : "status-pending"}" id="status-${faseKey}">
              ${completada ? "OK" : "PENDIENTE"}
            </span>
          </div>
          <div class="module-progress-bar">
            <div class="module-progress-fill" id="fill-${faseKey}" style="width: ${completada ? "100%" : "0%"}"></div>
          </div>
          <div>
            <span class="section-label">Instrucciones</span>
            <p class="section-text">${escapeHTML(fase.descripcion)}</p>
          </div>
          ${interactiveElement}
        `;
        grid.appendChild(card);

        // Event listener selection
        const btn = card.querySelector(`#btn-${faseKey}`);
        btn.addEventListener("click", () => {
          if (faseKey === "lectura" || faseKey === "proyecto") {
            completarFaseFija(faseKey);
          } else {
            validarFaseInteractiva(faseKey, fase.respuesta);
          }
        });
      });

      // Render Parents Approval section
      const panel = document.createElement("section");
      panel.className = "panel-padres";
      panel.innerHTML = `
        <h2>🔒 Panel de Verificación Parental</h2>
        <p>Una vez que Sebastián complete las 4 fases de hoy (digitales y en su cuaderno físico), introduzca la clave para guardar el progreso y desbloquear el día siguiente.</p>
        <button class="btn-firma" id="btnFirmaPadres" disabled>✍️ Firmar y Abrir Siguiente Día</button>
      `;
      app.appendChild(panel);

      comprobarEstadoFirma();

      function completarFaseFija(key) {
        resueltasDia[key] = true;
        guardarEstadoLocal();
        actualizarCardVisual(key);
        comprobarEstadoFirma();
      }

      function validarFaseInteractiva(key, respuestaCorrecta) {
        const respuestaUser = prompt("Introduce la respuesta exacta obtenida:");
        if (respuestaUser === null) return;
        if (normalizar(respuestaUser).includes(normalizar(respuestaCorrecta))) {
          alert("¡Correcto! Fase completada.");
          resueltasDia[key] = true;
          guardarEstadoLocal();
          actualizarCardVisual(key);
          comprobarEstadoFirma();
        } else {
          alert("Casi... Revisa el cuaderno e inténtalo de nuevo.");
        }
      }

      function guardarEstadoLocal() {
        localStorage.setItem(`seb_fases_dia_${diaActual}`, JSON.stringify(resueltasDia));
      }

      function actualizarCardVisual(key) {
        const card = document.getElementById(`card-${key}`);
        card.classList.add("completado");
        document.getElementById(`status-${key}`).className = "module-status status-done";
        document.getElementById(`status-${key}`).textContent = "OK";
        document.getElementById(`fill-${key}`).style.width = "100%";
        document.getElementById(`btn-${key}`).disabled = true;
        document.getElementById(`btn-${key}`).textContent = (key === "lectura" || key === "proyecto") ? "✓ Confirmado" : "✓ Resuelto";
      }

      function comprobarEstadoFirma() {
        const todoListo = fasesClaves.every(k => resueltasDia[k] === true);
        const btnFirma = document.getElementById("btnFirmaPadres");
        if (todoListo) {
          btnFirma.disabled = false;
        }
      }

      document.getElementById("btnFirmaPadres").addEventListener("click", () => {
        const clave = prompt("Padres: Introduzcan la palabra clave para verificar y firmar (Clave: aprobado):");
        if (clave && normalizar(clave) === "aprobado") {
          alert("¡Día firmado! Guardando registros en el sistema.");
          localStorage.setItem(`seb_dia_${diaActual}_completado`, "true");
          
          diaActual += 1;
          localStorage.setItem("seb_dia_actual", diaActual);
          
          window.location.reload();
        } else {
          alert("Clave incorrecta. Firma pendiente.");
        }
      });

    })
    .catch(err => {
      console.error(err);
      document.getElementById("app").innerHTML = `<div class="error-card"><h2>⚠ Error cargando estructura</h2><p>${escapeHTML(err.message)}</p></div>`;
    });
}
</script>

</body>
</html>
