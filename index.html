<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verano con Sebastián 🚀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0E14;
    --surface: #12161F;
    --surface-2: #1A1F2E;
    --border: rgba(0, 229, 255, 0.12);
    --border-dim: rgba(255,255,255,0.06);
    --cyan: #00E5FF;
    --cyan-dim: rgba(0, 229, 255, 0.18);
    --violet: #7C5CFF;
    --violet-dim: rgba(124, 92, 255, 0.15);
    --amber: #FFB020;
    --amber-dim: rgba(255, 176, 32, 0.15);
    --text: #E8ECF4;
    --text-muted: rgba(232, 236, 244, 0.45);
    --text-dim: rgba(232, 236, 244, 0.22);
    --mono: 'JetBrains Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
  }

  body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background lines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scan line animation */
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }

  body::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.08), transparent);
    animation: scanline 8s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    position: relative;
    z-index: 1;
    padding: 40px 24px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,229,255,0.04) 0%, transparent 100%);
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 24px 32px;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
  }

  .header-text {
    grid-column: 1;
    grid-row: 1;
  }

  .header-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(24px, 4vw, 38px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 span {
    color: var(--cyan);
  }

  .header-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 10px;
    letter-spacing: 0.05em;
  }

  /* ===== CORE RING ===== */
  .ring-wrap {
    grid-column: 2;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .ring-container {
    position: relative;
    width: 140px;
    height: 140px;
  }

  .ring-svg {
    width: 140px;
    height: 140px;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: rgba(0,229,255,0.1);
    stroke-width: 8;
  }

  .ring-progress {
    fill: none;
    stroke: var(--cyan);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 376;
    stroke-dashoffset: 376;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
    filter: drop-shadow(0 0 6px rgba(0,229,255,0.6));
  }

  .ring-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    color: var(--amber);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .ring-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* ===== STAT BAR ===== */
  .stat-bar {
    grid-column: 1;
    grid-row: 2;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
  }

  .stat-value.amber { color: var(--amber); }
  .stat-value.violet { color: var(--violet); }
  .stat-value.cyan { color: var(--cyan); }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .stat-divider {
    width: 1px;
    background: var(--border-dim);
    align-self: stretch;
  }

  /* ===== MAIN GRID ===== */
  main {
    position: relative;
    z-index: 1;
    padding: 32px 24px;
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ===== MODULE CARD ===== */
  .module {
    background: var(--surface);
    border: 1px solid var(--border-dim);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: border-color 0.3s, background 0.3s;
    position: relative;
    overflow: hidden;
  }

  .module::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .module:hover {
    border-color: var(--border);
    background: var(--surface-2);
  }

  .module:hover::before {
    opacity: 0.5;
  }

  .module.completado {
    border-color: rgba(0,229,255,0.25);
    background: rgba(0,229,255,0.04);
  }

  .module.completado::before {
    opacity: 1;
  }

  /* Module header */
  .module-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .module-icon-wrap {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: var(--violet-dim);
    border: 1px solid rgba(124,92,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .module.completado .module-icon-wrap {
    background: var(--cyan-dim);
    border-color: rgba(0,229,255,0.3);
  }

  .module-title-group {
    flex: 1;
  }

  .module-id {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .module-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .module-status {
    font-family: var(--mono);
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .status-pending {
    background: var(--violet-dim);
    color: var(--violet);
    border: 1px solid rgba(124,92,255,0.25);
  }

  .status-done {
    background: var(--cyan-dim);
    color: var(--cyan);
    border: 1px solid rgba(0,229,255,0.3);
  }

  /* Progress bar thin HUD line */
  .module-progress-bar {
    height: 2px;
    background: var(--border-dim);
    border-radius: 1px;
    overflow: hidden;
    margin: -8px 0;
  }

  .module-progress-fill {
    height: 100%;
    background: var(--cyan);
    border-radius: 1px;
    width: 0%;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 6px rgba(0,229,255,0.8);
  }

  /* Sections inside card */
  .module-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--cyan);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-dim);
  }

  .section-label.violet { color: var(--violet); }
  .section-label.amber { color: var(--amber); }

  .section-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.55;
  }

  /* ===== ACTION BUTTON ===== */
  .btn-responder {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid rgba(124,92,255,0.35);
    background: var(--violet-dim);
    color: var(--violet);
    font-family: var(--display);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: auto;
  }

  .btn-responder:hover:not(:disabled) {
    background: rgba(124,92,255,0.25);
    border-color: rgba(124,92,255,0.6);
    transform: translateY(-1px);
  }

  .btn-responder:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn-responder:disabled {
    border-color: rgba(0,229,255,0.25);
    background: var(--cyan-dim);
    color: var(--cyan);
    cursor: default;
  }

  /* ===== COUNTER ANIMATION ===== */
  @keyframes countUp {
    from { opacity: 0.5; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animating {
    animation: countUp 0.3s ease;
  }

  /* ===== LOADING / ERROR ===== */
  #cargando {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
  }

  .error-card {
    grid-column: 1 / -1;
    background: rgba(255,80,80,0.06);
    border: 1px solid rgba(255,80,80,0.2);
    border-radius: 12px;
    padding: 28px;
  }

  .error-card h2 {
    font-size: 16px;
    color: #FF5050;
    margin-bottom: 12px;
  }

  .error-card p, .error-card code {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .error-card code {
    font-family: var(--mono);
    color: var(--text-dim);
  }

  @media (max-width: 640px) {
    header {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
    }
    .ring-wrap {
      grid-column: 1;
      grid-row: 2;
      flex-direction: row;
      justify-content: flex-start;
    }
    .stat-bar { grid-row: 3; }
  }
</style>
</head>
<body>

<header>
  <div class="header-text">
    <p class="header-eyebrow">Sistema de aprendizaje — Verano 2025</p>
    <h1>Panel de <span>Sebastián</span></h1>
    <p class="header-sub">Preparando 6.º de Primaria · 10 módulos activos</p>
  </div>

  <div class="ring-wrap">
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 140 140" aria-hidden="true">
        <circle class="ring-track" cx="70" cy="70" r="60"/>
        <circle class="ring-progress" id="ringProgress" cx="70" cy="70" r="60"/>
      </svg>
      <div class="ring-inner">
        <span class="ring-value" id="puntosDisplay">0</span>
        <span class="ring-label">puntos</span>
      </div>
    </div>
  </div>

  <div class="stat-bar">
    <div class="stat">
      <span class="stat-value amber" id="statPuntos">0</span>
      <span class="stat-label">Puntos totales</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value cyan" id="statCompletados">0/10</span>
      <span class="stat-label">Módulos</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value violet" id="statPorcentaje">0%</span>
      <span class="stat-label">Progreso</span>
    </div>
  </div>
</header>

<main id="app">
  <p id="cargando">Iniciando sistema...</p>
</main>

<script>
const TOTAL_MODULOS = 10;
const PUNTOS_POR_RESPUESTA = 10;

let puntos = Number(localStorage.getItem("puntosSebastian")) || 0;
let resueltas = new Set(JSON.parse(localStorage.getItem("resueltasSebastian") || "[]"));

function actualizarUI() {
  const completados = resueltas.size;
  const maxPuntos = TOTAL_MODULOS * PUNTOS_POR_RESPUESTA;
  const pct = Math.round((puntos / maxPuntos) * 100);

  // Animated counter
  animarContador(document.getElementById("puntosDisplay"), puntos);
  animarContador(document.getElementById("statPuntos"), puntos);

  document.getElementById("statCompletados").textContent = completados + "/" + TOTAL_MODULOS;
  document.getElementById("statPorcentaje").textContent = pct + "%";

  // Ring
  const circunferencia = 376;
  const offset = circunferencia - (circunferencia * Math.min(puntos / maxPuntos, 1));
  document.getElementById("ringProgress").style.strokeDashoffset = offset;
}

let contadorAnimFrame = null;
function animarContador(el, objetivo) {
  const inicio = parseInt(el.textContent) || 0;
  if (inicio === objetivo) return;
  const duracion = 600;
  const startTime = performance.now();
  function step(now) {
    const t = Math.min((now - startTime) / duracion, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    el.textContent = Math.round(inicio + (objetivo - inicio) * ease);
    el.classList.add("animating");
    if (t < 1) requestAnimationFrame(step);
    else { el.textContent = objetivo; el.classList.remove("animating"); }
  }
  requestAnimationFrame(step);
}

function normalizar(texto) {
  return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().replace(/\s+/g, " ");
}

function escapeHTML(texto) {
  const div = document.createElement("div");
  div.textContent = texto;
  return div.innerHTML;
}

if (window.location.protocol === "file:") {
  document.getElementById("app").innerHTML = `
    <div class="error-card">
      <h2>⚠ Acceso directo detectado</h2>
      <p>El navegador bloquea la carga de <code>tareas.json</code> cuando abres el archivo con doble clic.</p>
      <p>Usa un servidor local: <code>python3 -m http.server</code> y visita <code>http://localhost:8000</code>, o publica en GitHub Pages.</p>
    </div>
  `;
} else {

  fetch("tareas.json")
    .then(res => {
      if (!res.ok) throw new Error("Respuesta del servidor: " + res.status);
      return res.json();
    })
    .then(data => {
      const app = document.getElementById("app");
      app.innerHTML = "";

      data.asignaturas.forEach((asig, idx) => {
        const yaResuelta = resueltas.has(asig.id);
        const card = document.createElement("article");
        card.className = "module" + (yaResuelta ? " completado" : "");
        card.dataset.id = asig.id;

        const modNum = String(idx + 1).padStart(2, "0");

        card.innerHTML = `
          <div class="module-head">
            <div class="module-icon-wrap" aria-hidden="true">${escapeHTML(asig.icono)}</div>
            <div class="module-title-group">
              <p class="module-id">MOD-${modNum}</p>
              <p class="module-name">${escapeHTML(asig.nombre)}</p>
            </div>
            <span class="module-status ${yaResuelta ? "status-done" : "status-pending"}">
              ${yaResuelta ? "OK" : "pendiente"}
            </span>
          </div>

          <div class="module-progress-bar">
            <div class="module-progress-fill" style="width: ${yaResuelta ? "100%" : "0%"}"></div>
          </div>

          <div class="module-section">
            <p class="section-label">Pregunta</p>
            <p class="section-text">${escapeHTML(asig.pregunta)}</p>
          </div>

          <div class="module-section">
            <p class="section-label violet">Tarea offline</p>
            <p class="section-text">${escapeHTML(asig.tarea)}</p>
          </div>

          <div class="module-section">
            <p class="section-label amber">Mini proyecto</p>
            <p class="section-text">${escapeHTML(asig.proyecto)}</p>
          </div>

          <button class="btn-responder" data-id="${escapeHTML(asig.id)}" ${yaResuelta ? "disabled" : ""}>
            ${yaResuelta ? "✓ Módulo completado" : "Responder pregunta"}
          </button>
        `;

        app.appendChild(card);
      });

      actualizarUI();

      app.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-id]");
        if (!btn || btn.disabled) return;
        const id = btn.dataset.id;
        const asig = data.asignaturas.find(a => a.id === id);
        if (asig) resolver(btn, asig);
      });
    })
    .catch(err => {
      console.error(err);
      document.getElementById("app").innerHTML = `
        <div class="error-card">
          <h2>⚠ Error al cargar contenidos</h2>
          <p>No se pudo leer <code>tareas.json</code>. Revisa la consola (F12).</p>
          <p><code>${escapeHTML(err.message)}</code></p>
        </div>
      `;
    });

  function resolver(btn, asig) {
    const respuesta = prompt("Escribe tu respuesta:");
    if (respuesta === null) return;

    const correcta = normalizar(respuesta).includes(normalizar(asig.respuesta));

    if (correcta) {
      alert("¡Correcto! +10 puntos");
      puntos += PUNTOS_POR_RESPUESTA;
      localStorage.setItem("puntosSebastian", puntos);

      resueltas.add(asig.id);
      localStorage.setItem("resueltasSebastian", JSON.stringify([...resueltas]));

      // Update button
      btn.disabled = true;
      btn.textContent = "✓ Módulo completado";

      // Update card
      const card = btn.closest(".module");
      card.classList.add("completado");
      card.querySelector(".module-status").className = "module-status status-done";
      card.querySelector(".module-status").textContent = "OK";
      card.querySelector(".module-icon-wrap").style.background = "rgba(0,229,255,0.18)";
      card.querySelector(".module-icon-wrap").style.borderColor = "rgba(0,229,255,0.3)";

      // Animate bar
      const bar = card.querySelector(".module-progress-fill");
      requestAnimationFrame(() => { bar.style.width = "100%"; });

      actualizarUI();
    } else {
      alert("Casi... revisa y vuelve a intentarlo.");
    }
  }
}
</script>

</body>
</html>
